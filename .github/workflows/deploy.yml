name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 192.168.178.122
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          script: |
            cd /opt/docker/webseite
            git pull origin main
            echo "✓ Website updated!"

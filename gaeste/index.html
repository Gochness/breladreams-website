<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>Breladreams · Gästebereich</title>
<style>
:root{
  --bg:#f7f3ec;
  --card:#fffdf8;
  --text:#1f1b16;
  --muted:#6f665a;
  --gold:#b08a4a;
  --line:#e8ded0;
}
*{box-sizing:border-box}
body{margin:0;font-family:Inter,Arial,sans-serif;background:linear-gradient(180deg,#fbf8f2,var(--bg));color:var(--text);min-height:100vh}
.wrap{max-width:640px;margin:auto;padding:64px 20px 40px;text-align:center}
.kicker{color:var(--gold);letter-spacing:.2em;text-transform:uppercase;font-size:12px;font-weight:700}
h1{font-family:Georgia,serif;font-size:40px;margin:12px 0 8px;font-weight:500}
.sub{color:var(--muted);font-size:16px;margin:0 0 40px}
.cards{display:grid;gap:18px}
.card{display:block;background:var(--card);border:1px solid var(--line);border-radius:24px;padding:28px 24px;text-decoration:none;color:var(--text);box-shadow:0 10px 30px rgba(0,0,0,.05);transition:.15s}
.card:active{transform:scale(.98)}
.icon{font-size:34px;margin-bottom:10px}
.card b{display:block;font-size:20px;margin-bottom:4px}
.card span{color:var(--muted);font-size:14px}
footer{margin-top:40px;color:var(--muted);font-size:13px}
</style>
</head>
<body>
<div class="wrap">
  <div class="kicker">Breladreams</div>
  <h1>Gästebereich</h1>
  <p class="sub">Guest Area · Only for guests staying at the apartment</p>
  <div class="cards">
    <a class="card" href="/kaffee/">
      <div class="icon">☕</div>
      <b>Kaffee-Anleitung</b>
      <span>Coffee machine guide · DE / EN / PL / CZ / SK</span>
    </a>
    <a class="card" href="/willkomeninfos/">
      <div class="icon">🏠</div>
      <b>Apartment Guide</b>
      <span>WLAN, Check-in/out, Hausregeln · DE / EN / PL / CZ / SK</span>
    </a>
  </div>
  <footer>Breladreams &middot; Brela, Croatia</footer>
</div>
</body>
</html>

  <title>Apartment-Guide | Breladreams</title>
  <link rel="stylesheet" href="../styles.css">
  <style>
    .langswitch{display:flex;gap:8px;flex-wrap:wrap;margin-top:16px}
    .langswitch button{border:1px solid var(--sand);background:var(--white);color:var(--text);border-radius:999px;padding:7px 15px;font-size:.85rem;cursor:pointer;font-family:inherit}
    .langswitch button.active{border-color:var(--accent);background:rgba(217,155,67,.14);font-weight:700}
    .langswitch button:focus-visible{outline:2px solid var(--blue);outline-offset:2px}
    .infogrid{display:grid;grid-template-columns:repeat(2,1fr);gap:18px;margin-top:22px}
    @media (max-width:700px){.infogrid{grid-template-columns:1fr}}
    .infogroup{background:var(--white);border:1px solid var(--sand);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 22px}
    .infogroup h3{margin:0 0 10px;font-size:1rem}
    .kv{display:grid;grid-template-columns:24px 1fr;gap:10px;padding:6px 0;font-size:.92rem}
    .kv b{grid-column:2;display:block}
    .kv span{color:var(--muted);grid-column:2}
    .crumb{color:var(--muted);font-size:.9rem;margin:0 0 10px}
    .crumb a{color:var(--blue);text-decoration:none}
  </style>
</head>

function render(lang){
  const d = DATA[lang];
  document.getElementById('title').textContent = d.title;
  document.getElementById('grid').innerHTML = d.guide.map(group => `
    <div class="infogroup"><h3>${group[0]}</h3>
      ${group[1].map(item => `<div class="kv"><span>${item[0]}</span><b>${item[1]}</b><span>${item[2]}</span></div>`).join('')}
    </div>
  `).join('');
  document.querySelectorAll('.langswitch button').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
}
document.querySelectorAll('.langswitch button').forEach(btn=>{
  btn.addEventListener('click', ()=>render(btn.dataset.lang));
});

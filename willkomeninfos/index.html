*{box-sizing:border-box}
body{margin:0;font-family:Inter,Arial,sans-serif;background:linear-gradient(180deg,#fbf8f2,var(--bg));color:var(--text)}
.wrap{max-width:900px;margin:auto;padding:24px 16px 40px}
header{text-align:center;margin-bottom:24px}
.kicker{color:var(--gold);letter-spacing:.2em;text-transform:uppercase;font-size:12px;font-weight:700}
h1{font-family:Georgia,serif;font-size:54px;margin:10px 0 6px;font-weight:500}
.sub{color:var(--muted);font-size:18px;line-height:1.5}
.langs{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:26px}
.langs button{border:1px solid var(--line);background:white;border-radius:999px;padding:12px 8px;cursor:pointer;font-size:15px;line-height:1.15;transition:.2s}
.langs button.active{border-color:var(--gold);font-weight:700;box-shadow:0 0 0 2px rgba(176,138,74,.16)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.card{background:var(--card);border:1px solid var(--line);border-radius:28px;padding:24px;box-shadow:0 10px 30px rgba(0,0,0,.05)}
.card h2{margin-top:0;font-family:Georgia,serif;font-size:30px;font-weight:500}
.item{display:grid;grid-template-columns:48px 1fr;gap:14px;padding:14px 0;border-top:1px solid var(--line)}
.item:first-of-type{border-top:none}
.icon{width:48px;height:48px;border-radius:14px;background:#f1e7d8;display:flex;align-items:center;justify-content:center;font-size:22px}
.item b{display:block;margin-bottom:4px;font-size:17px}
.item span{color:var(--muted);line-height:1.5}
footer{text-align:center;margin-top:30px;color:var(--muted)}
a{color:inherit}
@media(max-width:800px){h1{font-size:42px}.grid{grid-template-columns:1fr}.langs button{font-size:13px;padding:10px 4px}}
</style>
</head>

        <div class="item"><div class="icon">🛠️</div><div><b>Škody</b><span>Ak sa niečo poškodí alebo nefunguje, prosím dajte nám vedieť.</span></div></div>
      </div>`
  }
};

function setLang(lang){
  document.querySelectorAll('.langs button').forEach(btn => btn.classList.remove('active'));
  document.getElementById('btn-' + lang).classList.add('active');
  document.getElementById('title').innerHTML = translations[lang].title;
  document.getElementById('content').innerHTML = translations[lang].sections;
}

window.onload = function(){ setLang('en'); };
</script>
